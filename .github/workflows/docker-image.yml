name: Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/udiplomacy" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          BASE="${{ steps.image.outputs.name }}"
          TAGS="${BASE}:backend-latest"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="$TAGS,${BASE}:backend-${{ github.ref_name }}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/udiplomacy" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          BASE="${{ steps.image.outputs.name }}"
          TAGS="${BASE}:frontend-latest"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="$TAGS,${BASE}:frontend-${{ github.ref_name }}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
