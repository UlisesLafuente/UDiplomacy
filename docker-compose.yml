services:
  mongodb:
    image: mongo:7
    container_name: udiplomacy-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - udiplomacy-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5

  postgres:
    image: postgres:16
    container_name: udiplomacy-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: udiplomacy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - udiplomacy-net
    healthcheck:
      test: pg_isready -U postgres
      interval: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: udiplomacy-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - udiplomacy-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: udiplomacy-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - udiplomacy-net

volumes:
  mongo-data:
  postgres-data:

networks:
  udiplomacy-net:
    driver: bridge
